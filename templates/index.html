<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aero | Weather App</title>

    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;700&display=swap" rel="stylesheet">

    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <!-- Custom CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>

<body>
    <!-- Animated Background Orbs -->
    <div class="background-orbs">
        <div class="orb orb-1"></div>
        <div class="orb orb-2"></div>
        <div class="orb orb-3"></div>
    </div>

    <div class="app-container glass-panel">
        <header>
            <form id="search-form" class="search-box">
                <input type="text" id="city-input" placeholder="Enter city name..." autocomplete="off">
                <button type="submit" class="search-btn">
                    <i class="fa-solid fa-magnifying-glass"></i>
                </button>
            </form>
        </header>

        <!-- Loading State -->
        <div id="loading" class="hidden">
            <i class="fa-solid fa-spinner fa-spin"></i> Fetching weather...
        </div>

        <!-- Error State -->
        <div id="error-message" class="hidden text-danger"></div>

        <!-- Weather Content -->
        <main id="weather-content" class="hidden fade-in">
            <h1 id="city-name">--</h1>
            <p id="weather-desc" class="description">--</p>

            <div class="temperature-container">
                <span id="temp-value">--</span>
                <span class="temp-unit">°C</span>
            </div>

            <div class="details-row">
                <div class="detail-card">
                    <i class="fa-solid fa-wind"></i>
                    <div>
                        <p class="detail-label">Wind</p>
                        <p class="detail-value"><span id="wind-speed">--</span> km/h</p>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <!-- Custom JS -->
    <script src="{{ url_for('static', filename='js/script.js') }}"></script>
</body>

</html>
